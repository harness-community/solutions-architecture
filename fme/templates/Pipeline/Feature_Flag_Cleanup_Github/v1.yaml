template:
  name: Feature Flag Clean-up Github
  identifier: Feature_Flag_Cleanup_Github
  versionLabel: v1
  type: Pipeline
  projectIdentifier: Harness_Split
  orgIdentifier: PROD
  description: Automate feature flag removal with this ready-to-use pipeline template. Powered by our AI coding agent, it scans your codebase, removes the feature flags you select, and helps you ship cleaner, leaner code.
  tags:
    feature-flag: ""
    clean-up: ""
    github: ""
  icon: data:image/png;base64,
  spec:
    stages:
      - stage:
          name: Feature Flags Finder
          identifier: FFCleanupStage
          description: ""
          type: CI
          spec:
            cloneCodebase: false
            caching:
              enabled: true
              override: true
              paths: []
            platform:
              os: Linux
              arch: Arm64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                - step:
                    identifier: metadata
                    name: Setting Metadata Up
                    type: Run
                    timeout: 10m
                    spec:
                      shell: Bash
                      command: |-
                        #!/usr/bin/env bash

                        get_repo_name() {
                          local clean="${1%.git}"
                          echo "${clean##*/}"
                        }

                        get_repo_owner() {
                          local clean="${1%.git}"
                          local owner="${clean%/*}"
                          echo "${owner##*/}"
                        }

                        repoUrl=${REPO_URL}
                        repoName=$(get_repo_name "$repoUrl")
                        repoOwner=$(get_repo_owner "$repoUrl")

                        # Repository
                        export METADATA_REPO_NAME=${repoName}
                        export METADATA_REPO_OWNER=${repoOwner}

                        #Metadata Workdir
                        export METADATA_WORKDIR="/harness/tempdir"


                        # Url and domain
                        url="<+pipeline.executionUrl>"
                        domain=$(echo "$url" | awk -F/ '{print $3}')
                        export METADATA_DOMAIN="$domain"
                        export METADATA_BASE_URL="https://$domain"

                        # User
                        export METADATA_USER_NAME="<+pipeline.triggeredBy.name>"
                        export METADATA_USER_EMAIL="<+pipeline.triggeredBy.email>"

                        # Account metadata
                        export HARNESS_ACCOUNT=<+account.identifier>
                        export HARNESS_ORG=<+org.identifier>
                        export HARNESS_PROJECT=<+project.identifier>

                        export ELEGIBLE_FEATURE_FLAGS="none"
                      envVariables:
                        REPO_NAME: <+pipeline.variables.REPO_NAME>
                        REPO_URL: <+pipeline.variables.REPO_URL>
                      outputVariables:
                        - name: elegibleFeatureFlags
                          type: String
                          value: ELEGIBLE_FEATURE_FLAGS
                        - name: workdir
                          type: String
                          value: METADATA_WORKDIR
                        - name: repoName
                          type: String
                          value: METADATA_REPO_NAME
                        - name: repoOwner
                          type: String
                          value: METADATA_REPO_OWNER
                        - name: baseUrl
                          type: String
                          value: METADATA_BASE_URL
                        - name: domain
                          type: String
                          value: METADATA_DOMAIN
                        - name: userName
                          type: String
                          value: METADATA_USER_NAME
                        - name: userEmail
                          type: String
                          value: METADATA_USER_EMAIL
                        - name: account
                          type: String
                          value: HARNESS_ACCOUNT
                        - name: organization
                          type: String
                          value: HARNESS_ORG
                        - name: project
                          type: String
                          value: HARNESS_PROJECT
                  contextType: Pipeline
                - step:
                    identifier: createNetrc
                    name: Create Netrc
                    type: Run
                    timeout: 10m
                    spec:
                      shell: Bash
                      command: |-
                        #!/usr/bin/env bash
                        cat <<EOF > ${HOME}/.netrc
                          machine github.com
                          login <+pipeline.variables.REPO_USERNAME>
                          password <+pipeline.variables.REPO_API_TOKEN>
                        EOF
                - step:
                    identifier: gitclone
                    name: Git clone repo
                    type: Run
                    timeout: 10m
                    spec:
                      shell: Bash
                      command: |
                        #!/usr/bin/env bash

                        mkdir /harness/${REPO_NAME}
                        cd /harness/${REPO_NAME}

                        git init
                        git remote add origin <+pipeline.variables.REPO_URL>
                        git fetch origin <+pipeline.variables.REPO_BRANCH>
                        git checkout <+pipeline.variables.REPO_BRANCH>

                        ls -l /harness/${REPO_NAME}
                      envVariables:
                        REPO_NAME: <+steps.metadata.output.outputVariables.repoName>
                - step:
                    type: Run
                    name: Find Flags to clean-up
                    identifier: findfossilizedflags
                    spec:
                      shell: Python
                      command: |
                        #!/usr/bin/env python
                        import os
                        import urllib.parse
                        import itertools
                        import json
                        import time

                        from dataclasses import dataclass, asdict
                        from typing import List, Dict, Optional

                        import requests

                        from pathlib import Path

                        def search_string_in_files(
                                search_string: str,
                                root_directory: str,
                                excluded_folders: List[str] = None,
                                extensions: List[str] = None
                        ) -> Dict[str, List[Dict[str, any]]]:
                            """
                            Search for a string in all files within a directory.

                            Args:
                                search_string: The string to search for
                                root_directory: Path to the directory to search in
                                excluded_folders: List of folder names to exclude (e.g., ['.git', 'node_modules'])
                                extensions: List of file extensions to include (e.g., ['.py', '.txt']).
                                          If None, searches in all files.

                            Returns:
                                Dictionary with the searched string as key and a list of results as value.
                                Each result contains: file, line, column
                            """
                            if excluded_folders is None:
                                excluded_folders = ['.git']

                            results = {search_string: []}
                            directory_path = Path(root_directory).resolve()

                            # Walk through all files in the directory
                            for current_path, folders, files in os.walk(directory_path):
                                # Filter out excluded folders
                                folders[:] = [f for f in folders if f not in excluded_folders]

                                for file_name in files:
                                    full_path = Path(current_path) / file_name

                                    # Filter by extension if specified
                                    if extensions and full_path.suffix not in extensions:
                                        continue

                                    try:
                                        # Try to read the file as text
                                        with open(full_path, 'r', encoding='utf-8', errors='ignore') as file:
                                            for line_number, line in enumerate(file, start=1):
                                                # Search for all occurrences of the string in the line
                                                column = 0
                                                while True:
                                                    position = line.find(search_string, column)
                                                    if position == -1:
                                                        break

                                                    # Save the result
                                                    results[search_string].append({
                                                        'file': str(full_path),
                                                        'line': line_number,
                                                        'column': position + 1  # +1 to make it 1-indexed
                                                    })

                                                    column = position + 1

                                    except (PermissionError, IsADirectoryError):
                                        # Ignore files without permission or that are directories
                                        continue
                                    except Exception as e:
                                        # Ignore other errors (binary files, etc.)
                                        continue

                            return results


                        def print_results(results: Dict[str, List[Dict[str, any]]]):
                            """
                            Print the results in a readable format.
                            """
                            for searched_string, occurrences in results.items():
                                print(f"\nSearching for: '{searched_string}'")
                                print(f"Total occurrences found: {len(occurrences)}")
                                print("-" * 80)

                                if not occurrences:
                                    print("No results found.")
                                else:
                                    for result in occurrences:
                                        print(f"File: {result['file']}")
                                        print(f"  Line: {result['line']}, Column: {result['column']}")



                        @dataclass
                        class IdAndName:
                            id: str
                            name: str

                            def to_dict(self) -> Dict:
                                return {"id": self.id, "name": self.name}


                        @dataclass
                        class Environment:
                            id: str
                            name: str
                            type: str
                            production: bool

                            def to_dict(self) -> Dict:
                                return {"id": self.id, "name": self.name, "type": self.type, "production": self.production}


                        @dataclass
                        class RolloutStatus:
                            id: str
                            name: str

                            def to_dict(self) -> Dict:
                                return {"id": self.id, "name": self.name}


                        @dataclass
                        class FFMetadata:
                            id: str
                            name: str
                            description: str
                            traffic_type: IdAndName
                            creation_time: int
                            rollout_status: Optional[RolloutStatus]
                            rollout_status_timestamp: Optional[int]
                            tags: List[str]

                            @staticmethod
                            def from_dict(data: Dict) -> 'FFMetadata':
                                return FFMetadata(
                                    data['id'],
                                    data['name'],
                                    data['description'],
                                    IdAndName(**data['trafficType']),
                                    data['creationTime'],
                                    RolloutStatus(**data['rolloutStatus']) if 'rolloutStatus' in data else None,
                                    data.get('rolloutStatusTimestamp'),
                                    data['tags'],
                                )


                        @dataclass
                        class Treatment:
                            name: str
                            description: str
                            keys: Optional[List[str]]

                            @staticmethod
                            def from_dict(data: Dict) -> 'Treatment':
                                return Treatment(data['name'], data['description'], data.get('keys'))

                            def to_dict(self) -> Dict:
                                return {"name": self.name, "description": self.description, "keys": self.keys}


                        @dataclass
                        class Bucket:
                            treatment: str
                            size: int

                            def to_dict(self) -> Dict:
                                return {"treatment": self.treatment, "size": self.size}


                        @dataclass
                        class Matcher:
                            type: str

                            @staticmethod
                            def from_dict(data: Dict) -> 'Matcher':
                                return Matcher(data['type'])

                            def to_dict(self) -> Dict:
                                return {"type": self.type}


                        @dataclass
                        class Condition:
                            combiner: str
                            matchers: List[Matcher]

                            @staticmethod
                            def from_dict(data: Dict) -> 'Condition':
                                return Condition(data['combiner'], [Matcher.from_dict(md) for md in data['matchers']])

                            def to_dict(self) -> Dict:
                                return {"combiner": self.combiner, "matchers": [m.to_dict() for m in self.matchers]}


                        @dataclass
                        class Rule:
                            buckets: List[Bucket]
                            condition: Condition

                            @staticmethod
                            def from_dict(data: Dict) -> 'Rule':
                                return Rule([Bucket(**b) for b in data['buckets']], Condition.from_dict(data['condition']))

                            def to_dict(self) -> Dict:
                                return {"buckets": [b.to_dict() for b in self.buckets], "condition": self.condition.to_dict()}



                        @dataclass
                        class FFDefinition:
                            id: str
                            name: str
                            environment: IdAndName
                            traffic_type: IdAndName
                            killed: bool
                            treatments: List[Treatment]
                            default_treatment: str
                            baseline_treatment: Optional[str]
                            traffic_allocation: int
                            rules: List[Rule]
                            default_rule: List[Bucket]
                            creation_time: int
                            last_update_time: int
                            change_number: int
                            impressions_disabled: bool
                            last_traffic_received_at: int

                            @staticmethod
                            def from_dict(data: Dict) -> 'FFDefinition':
                                return FFDefinition(
                                    data["id"],
                                    data["name"],
                                    IdAndName(**data["environment"]),
                                    IdAndName(**data["trafficType"]),
                                    data["killed"],
                                    [Treatment.from_dict(t) for t in data["treatments"]],
                                    data["defaultTreatment"],
                                    data.get("baselineTreatment"),
                                    data["trafficAllocation"],
                                    [Rule.from_dict(r) for r in data["rules"]],
                                    [Bucket(**b) for b in data["defaultRule"]],
                                    data["creationTime"],
                                    data["lastUpdateTime"],
                                    data["changeNumber"],
                                    data["impressionsDisabled"],
                                    data.get("lastTrafficReceivedAt"),
                                )

                            def to_dict(self) -> Dict:
                                return {
                                    "id": self.id,
                                    "name": self.name,
                                    "environment": self.environment.to_dict(),
                                    "trafficType": self.traffic_type.to_dict(),
                                    "killed": self.killed,
                                    "treatments": [treatment.to_dict() for treatment in self.treatments],
                                    "defaultTreatment": self.default_treatment,
                                    "baselineTreatment": self.baseline_treatment,
                                    "trafficAllocation": self.traffic_allocation,
                                    "rules": [rule.to_dict() for rule in self.rules],
                                    "defaultRule": [d.to_dict() for d in self.default_rule],
                                    "creationTime": self.creation_time,
                                    "lastUpdateTime": self.last_update_time,
                                    "changeNumber": self.change_number,
                                    "impressionsDisabled": self.impressions_disabled,
                                    "lastTrafficReceivedAt": self.last_traffic_received_at
                                }


                        class ApiClient:

                            def __init__(self, apikey: str, wsid: str, **kwargs):
                                self._apikey = apikey
                                self._wsid = wsid
                                self._base_url = kwargs.get("base_url", 'https://api.split.io')

                            def list_environments(self) -> List[Environment]:

                                while True:
                                    resp = requests.get(
                                        urllib.parse.urljoin(self._base_url, f"internal/api/v2/environments/ws/{self._wsid}"),
                                        headers={'Authorization': f"Bearer {self._apikey}"}
                                    )

                                    if resp.status_code == 429:
                                        print("[list_environments] Rate limit hit, waiting 10 seconds & retrying")
                                        time.sleep(10)
                                        continue

                                    if resp.status_code != 200:
                                        raise RuntimeError(f"unexpected status code {resp.status_code} when listing environments: {resp.text}")

                                    return [Environment(**props) for props in resp.json()]

                            def list_flag_metadatas(self) -> List[FFMetadata]:

                                mds = []
                                offset = 0
                                while True:

                                    resp = requests.get(
                                        urllib.parse.urljoin(self._base_url, f"/internal/api/v2/splits/ws/{self._wsid}"),
                                        headers={'Authorization': f"Bearer {self._apikey}"},
                                        params={'offset': offset, 'limit': 50},
                                    )

                                    if resp.status_code == 429:
                                        print("[list_flag_metadatas] Rate limit hit, waiting 10 seconds & retrying")
                                        time.sleep(10)
                                        continue

                                    if resp.status_code != 200:
                                        raise RuntimeError(f"unexpected status code {resp.status_code} when listing FF metadatas: {resp.text}")

                                    body = resp.json()
                                    mds.extend(FFMetadata.from_dict(props) for props in body['objects'])
                                    offset = len(mds)

                                    if offset >= body['totalCount']: # using >= in case FFs get deleted while this is iterating
                                        return mds

                            def list_flag_definitions(self, env_id: str) -> List[FFDefinition]:

                                defs = []
                                offset = 0
                                while True:
                                    resp = requests.get(
                                        urllib.parse.urljoin(self._base_url,f"/internal/api/v2/splits/ws/{self._wsid}/environments/{env_id}"),
                                        headers={'Authorization': f"Bearer {self._apikey}"},
                                        params={'offset': offset, 'limit': 50},
                                    )

                                    if resp.status_code == 429:
                                        print("[list_flag_definitions] Rate limit hit, waiting 10 seconds & retrying")
                                        time.sleep(10)
                                        continue

                                    if resp.status_code != 200:
                                        raise RuntimeError(f"unexpected status code {resp.status_code} when listing FF definitions: {resp.text}")

                                    body = resp.json()
                                    defs.extend(FFDefinition.from_dict(props) for props in body['objects'])
                                    offset = len(defs)

                                    if offset >= body['totalCount']: # using >= in case FFs get deleted while this is iterating
                                        return defs


                        @dataclass
                        class FossilizedFlag:
                            name: str
                            treatment: str
                            reason: str


                        class FossilizedFlagFinder:

                            def __init__(self, client: ApiClient):
                                self._client = client

                            def get_fossilized_flags(self, require_fully_rolled_out_status: bool = False) -> List[FossilizedFlag]:

                                mds = self._client.list_flag_metadatas()
                                permanent = [
                                    md.name for md in mds
                                    if md.rollout_status is not None and md.rollout_status.name == 'Permanent'
                                ]

                                all_ffs = [ff for env in self._client.list_environments() for ff in self._client.list_flag_definitions(env.id)]
                                by_name = {}
                                key=lambda ff: ff.name
                                for name, ffs in itertools.groupby(sorted(all_ffs, key=key), key=key):
                                    by_name[name] = list(ffs)

                                fossilized = [
                                    FossilizedFlag(name, treatment, 'rolled out across all envs')
                                    for name, defs in by_name.items()
                                    if (treatment := self.get_fossilized_treatment_for_definitions(defs)) and name not in permanent
                                ]

                                if require_fully_rolled_out_status:
                                    # TODO(mredolatti): fetch flag metadata rollout status & filter
                                    pass

                                return fossilized

                            def get_all_flags(self) -> Dict[str, List[FFDefinition]]:
                                all_ffs = [ff for env in self._client.list_environments() for ff in self._client.list_flag_definitions(env.id)]
                                by_name = {}
                                key=lambda ff: ff.name
                                for name, ffs in itertools.groupby(sorted(all_ffs, key=key), key=key):
                                    by_name[name] = list(ffs)

                                return by_name

                            @classmethod
                            def get_fossilized_treatment_for_definitions(cls, ffs: List[FFDefinition]) -> Optional[str]:
                                treatment = cls.get_fossilized_treatment_for_definition(ffs[0])
                                if not treatment:
                                    return None

                                if not all(cls.get_fossilized_treatment_for_definition(ff) == treatment for ff in ffs):
                                    return None

                                return treatment


                            @classmethod
                            def get_fossilized_treatment_for_definition(cls, ff: FFDefinition) -> Optional[str]:
                                treatment = cls.get_fossilized_treatment_for_buckets(ff.default_rule)
                                if not treatment:
                                    return None

                                # for whitelists with different treatmetns
                                for t in ff.treatments:
                                    if t.keys and len(t.keys) > 0 and t != treatment:
                                        return None

                                if not all(cls.get_fossilized_treatment_for_buckets(rule.buckets) == treatment for rule in ff.rules):
                                    return None

                                return treatment


                            @classmethod
                            def get_fossilized_treatment_for_buckets(cls, ts: List[Bucket]) -> Optional[str]:
                                try:
                                    return next(t for t in ts if t.size == 100).treatment
                                except StopIteration:
                                    return None


                        def main():
                            apikey = os.getenv('HFRA_FME_ADMIN_APIKEY')
                            ws_id = os.getenv('HFRA_FME_PROJECT_ID')
                            if not apikey or not ws_id:
                                raise RuntimeError('apikey and ws_id are mandatory')

                            kwargs = {}
                            base_url = os.getenv('HFRA_FME_BASE_URL')
                            kwargs = {'base_url': base_url} if base_url else {}
                            client = ApiClient(apikey, ws_id, **kwargs)

                            fff = FossilizedFlagFinder(client)
                            flags = fff.get_all_flags()

                            output_dir = os.getenv('HFRA_FFF_OUTPUT_DIR', '.')
                            os.makedirs(output_dir, exist_ok=True)


                            folders_to_exclude = ['.git']

                            # File extensions (optional)
                            # allowed_extensions = ['.py', '.txt', '.md']  # Uncomment to filter
                            allowed_extensions = None  # None = all files

                            directory = os.getenv('HFRA_REPO_DIR', '.')

                            to_dump = {}
                            for flag_name, flag in flags.items():
                                #print(f"Searching for '{flag_name}' in {directory}...")
                                results = search_string_in_files(
                                    search_string=flag_name,
                                    root_directory=directory,
                                    excluded_folders=folders_to_exclude,
                                    extensions=allowed_extensions
                                )

                                for feature_flag, occurrences in results.items():
                                    if occurrences:
                                        to_dump[flag_name] = [ff.to_dict() for ff in flag]

                            with open(f"{output_dir}/elegible_flags.json", 'w') as f:
                                json.dump(to_dump, f)

                        if __name__ == '__main__':
                            main()
                      envVariables:
                        HFRA_REPO_DIR: /harness/<+steps.metadata.output.outputVariables.repoName>
                        HFRA_FFF_OUTPUT_DIR: <+steps.metadata.output.outputVariables.workdir>
                        HFRA_FME_ADMIN_APIKEY: <+pipeline.variables.FME_ADMIN_APIKEY>
                        HFRA_FME_PROJECT_ID: <+pipeline.variables.FME_PROJECT_ID>
                - step:
                    type: Run
                    name: Generate Prompt
                    identifier: Generate_Prompt
                    spec:
                      shell: Bash
                      command: |-
                        #!/usr/bin/env bash

                        SELECTION_CRITERIA="<+pipeline.variables.FEATURE_FLAG_SELECTION_CRITERIA>"
                        WORKING_DIR="<+steps.metadata.output.outputVariables.workdir>"
                        OUTPUT_TASK="${WORKING_DIR}/task.txt"
                        FFF_OUTPUT="$(cat ${WORKING_DIR}/elegible_flags.json)"

                        echo "Please execute the following steps:
                          - Wrapped between marker: `<@>` , here is an object serialized in JSON, where Top-level keys are feature flag names (e.g. sdk_push_notifications), and each holds an array of entries — one per environment (e.g. Prod and Stage): <@>${FFF_OUTPUT}<@>
                          - The provided object MUST BE filtered by the feature flags that follows the next criteria: '${SELECTION_CRITERIA}'
                          - The output MUST BE a ONLY ONE string comma separated where each feature flag in the string follows this pattern: '{feature_flag_name} (treatment={ff.treatment}; reason={reason})'. Where feature_flag_name is the Feature Flag Name, the treatment is the feature flag treatment and the reason is a very short sentence that explains why the feature flag has been selected.
                            - The output comma separated string must be write in a new file named \`${WORKING_DIR}/filtered_flags.txt\`" > ${OUTPUT_TASK}
                - step:
                    type: Plugin
                    name: Feature Flag Selector Agent
                    identifier: selector_codeagent
                    spec:
                      connectorRef: account.harnessImage
                      registryRef: fme-docker
                      image: harness/ai-code-agent:v1.2.0
                      imagePullPolicy: Always
                      envVariables:
                        TASK_FILE: <+steps.metadata.output.outputVariables.workdir>/task.txt
                        WORKING_DIRECTORY: /harness
                        ANTHROPIC_API_KEY: <+pipeline.variables.LLM_AUTH_TOKEN>
                        MAX_ITERATIONS: 250
                      volumes:
                        - name: workspace
                          mountPath: /harness
                    timeout: 10m
                    failureStrategies:
                      - onFailure:
                          errors:
                            - AllErrors
                          action:
                            type: Retry
                            spec:
                              retryCount: 3
                              retryIntervals:
                                - 10s
                                - 20s
                                - 30s
                              onRetryFailure:
                                action:
                                  type: Abort
                - step:
                    type: Run
                    name: Elegible Feature Flags
                    identifier: elegible_feature_flags
                    spec:
                      shell: Bash
                      command: |-
                        #!/bin/bash

                        export ELEGIBLE_FEATURE_FLAGS=$(cat $WORK_DIR/filtered_flags.txt)
                      envVariables:
                        WORK_DIR: <+steps.metadata.output.outputVariables.workdir>
                      outputVariables:
                        - name: elegibleFeatureFlags
                          type: String
                          value: ELEGIBLE_FEATURE_FLAGS
            buildIntelligence:
              enabled: false
      - stage:
          name: Cleanup Feature Flag Approval
          identifier: app
          description: ""
          type: Approval
          spec:
            execution:
              steps:
                - step:
                    type: HarnessApproval
                    name: Feature Flag Selector
                    identifier: HarnessApproval_1
                    spec:
                      approvalMessage: Please select the Feature Flag to be cleaned up from your codebase and approve the pipeline progression
                      includePipelineExecutionHistory: true
                      isAutoRejectEnabled: false
                      approvers:
                        userGroups:
                          - _project_all_users
                        minimumCount: 1
                        disallowPipelineExecutor: false
                      approverInputs:
                        - name: FeatureFlags
                          defaultValue: ""
                          description: Elegible feature flags
                          selectOneFrom: <+pipeline.stages.FFCleanupStage.spec.execution.steps.elegible_feature_flags.output.outputVariables.elegibleFeatureFlags>
                    timeout: 1d
          tags: {}
      - stage:
          name: Clean up Feature Flag
          identifier: Clean_up_Feature_Flag
          description: ""
          type: CI
          spec:
            cloneCodebase: false
            caching:
              enabled: true
              override: true
            platform:
              os: Linux
              arch: Arm64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                - step:
                    identifier: createNetrc
                    name: Create Netrc
                    type: Run
                    timeout: 10m
                    spec:
                      shell: Bash
                      command: |-
                        #!/usr/bin/env bash
                        cat <<EOF > ${HOME}/.netrc
                          machine github.com
                          login <+pipeline.variables.REPO_USERNAME>
                          password <+pipeline.variables.REPO_API_TOKEN>
                        EOF
                - step:
                    identifier: gitclone
                    name: Git clone repo
                    type: Run
                    timeout: 10m
                    spec:
                      shell: Bash
                      command: |
                        #!/usr/bin/env bash

                        mkdir /harness/${REPO_NAME}
                        cd /harness/${REPO_NAME}

                        git init
                        git remote add origin <+pipeline.variables.REPO_URL>
                        git fetch origin <+pipeline.variables.REPO_BRANCH>
                        git checkout <+pipeline.variables.REPO_BRANCH>

                        ls -l /harness/${REPO_NAME}
                      envVariables:
                        REPO_NAME: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.repoName>
                - step:
                    type: Run
                    name: Stage setup
                    identifier: stage_setup
                    spec:
                      shell: Bash
                      command: |-
                        #!/usr/bin/env bash

                        mkdir -p <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.workdir>

                        echo "Flag: <+pipeline.stages.app.spec.execution.steps.HarnessApproval_1.output.approverInputs.FeatureFlags>"

                        ls -la
                - step:
                    type: Run
                    name: Generate Prompt
                    identifier: Generate_Prompt
                    spec:
                      shell: Bash
                      command: |-
                        #!/usr/bin/env bash

                        WORKING_DIR="<+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.workdir>"

                        OUTPUT_TASK="${WORKING_DIR}/task.txt"
                        FFF_OUTPUT="<+pipeline.stages.app.spec.execution.steps.HarnessApproval_1.output.approverInputs.FeatureFlags>"

                        echo "Please execute the following steps:
                          - Wrapped in single quotes, here is an string with the pattern '<feature_flag> (treatment=<treatment>; reason=<reason>)', containing the feature flags from a harness environment, to be removed from code if present (name, treatment & reason why it's elegible to remove): '${FFF_OUTPUT}'
                          - For the elegible flag:
                              - Scan the code repository to find files containing references to the flags returned in the prior step. The list of files returned will be referred from now on as the \`pending files list\`.
                              - For each file in the \`pending file list\`:
                                  - Interact with the filesystem as necessary to read the contents of the file
                                  - If the reference to the flag name is part of an evaluation, proceed as follows:
                                      - Remove all evaluations of the flag, leaving only the source code associated to the elegible treatment for it.
                                        - If the removed code contains a reference to a variable and there aren't additional references, remove it.
                                      - If the split client is not used for further evaluations in that context, remove it (as well as any package import directives)
                                      - Interact with the filysystem as necessary to write the updated file back overwriting the original one. DO NOT use a different name.
                                  - If it's a public/exported constant, use the name of the constant as a new search target to continue searching the repository for references to it. Add any possible outcome to \`pending-file-list\ so that they're iterated as well within this loop.
                          - After all files have been updated end the conversation with the next outcome to apply changes in a git repository:
                              - write a new file named \`${WORKING_DIR}/branch.txt\` with the branch name, should be short, descriptive and have no spaces and ends with a suffix number like a timestamp.
                              - write a new file named \`${WORKING_DIR}/commit.txt\` with a commit description message.
                              - write a new file named \`${WORKING_DIR}/pr_title.txt\`
                              - write a new file named \`${WORKING_DIR}/pr_description.txt\` within a summary about all performed changes." > ${OUTPUT_TASK}
                - step:
                    type: Plugin
                    name: code-agent
                    identifier: codeagent
                    spec:
                      connectorRef: account.harnessImage
                      registryRef: fme-docker
                      image: harness/ai-code-agent:v1.2.0
                      imagePullPolicy: Always
                      envVariables:
                        TASK_FILE: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.workdir>/task.txt
                        WORKING_DIRECTORY: /harness
                        ANTHROPIC_API_KEY: <+pipeline.variables.LLM_AUTH_TOKEN>
                        MAX_ITERATIONS: 250
                      volumes:
                        - name: workspace
                          mountPath: /harness
                    timeout: 10m
                    failureStrategies:
                      - onFailure:
                          errors:
                            - AllErrors
                          action:
                            type: Retry
                            spec:
                              retryCount: 3
                              retryIntervals:
                                - 10s
                                - 20s
                                - 30s
                              onRetryFailure:
                                action:
                                  type: Abort
                - step:
                    type: Run
                    name: Push PR
                    identifier: Push_PR
                    spec:
                      shell: Bash
                      command: |-
                        #!/bin/bash
                        set -ex

                        GITHUB_REPO_NAME=${REPO_NAME}
                        : ${HARNESS_ACCOUNT:?"HARNESS_ACCOUNT environment variable is required"}
                        : ${HARNESS_ORG:?"HARNESS_ORG environment variable is required"}
                        : ${HARNESS_PROJECT:?"HARNESS_PROJECT environment variable is required"}
                        : ${REPO_API_TOKEN:?"REPO_API_TOKEN environment variable is required"}
                        : ${HARNESS_BASE_URL?="HARNESS_BASE_URL failed to populate from execution URL"}
                        : ${HARNESS_COMMITTER_NAME:?"HARNESS_COMMITTER_NAME environment variable is required"}
                        : ${HARNESS_COMMITTER_EMAIL:?"HARNESS_COMMITTER_EMAIL environment variable is required"}

                        echo "- Pushing PR in repository '${REPO_NAME}'..."
                        echo "  - HARNESS_ACCOUNT='${HARNESS_ACCOUNT}'"
                        echo "  - HARNESS_ORG='${HARNESS_ORG}'"
                        echo "  - HARNESS_PROJECT='${HARNESS_PROJECT}'"
                        echo "  - REPO_API_TOKEN='${REPO_API_TOKEN}'"
                        echo "  - HARNESS_BASE_URL='${HARNESS_BASE_URL}'"

                        BRANCH_NAME=$(cat ${WORKING_DIR}/branch.txt)
                        COMMIT_MESSAGE=$(cat ${WORKING_DIR}/commit.txt)
                        PR_DESCRIPTION=$(cat ${WORKING_DIR}/pr_description.txt)
                        PR_TITLE=$(cat ${WORKING_DIR}/pr_title.txt)
                        GITIGNORE_FILE=".gitignore"
                        PATTERN=$(basename ${WORKING_DIR})

                        cd ${REPO_NAME}

                        if ! grep -qxF "$PATTERN" "$GITIGNORE_FILE"; then
                            echo "$PATTERN" >> "$GITIGNORE_FILE"
                            echo "✓ Dir '$PATTERN' added to $GITIGNORE_FILE"
                        else
                            echo "✓ Dir '$PATTERN' already exist in $GITIGNORE_FILE"
                        fi

                        # as of today, pipelines in QA don't have a git user configured
                        if ! git config get user.email; then
                            git config --global user.email "${HARNESS_COMMITTER_EMAIL}"
                            git config --global user.name "${HARNESS_COMMITTER_NAME}"
                        fi

                        git checkout -b ${BRANCH_NAME}
                        git add .
                        git commit -m "${COMMIT_MESSAGE}"
                        git push origin ${BRANCH_NAME}

                        PR_DESCRIPTION_ESCAPED=$(echo "$PR_DESCRIPTION" | jq -Rs .)

                        curl -i -X POST \
                          "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/pulls" \
                          -H "Accept: application/vnd.github+json" \
                          -H "Authorization: Bearer ${REPO_API_TOKEN}" \
                          -H "X-GitHub-Api-Version: 2022-11-28" \
                          -d @- <<EOF
                            {
                              "title":"${PR_TITLE}",
                              "body":${PR_DESCRIPTION_ESCAPED},
                              "head":"${BRANCH_NAME}",
                              "base":"main"
                            }
                        EOF
                      envVariables:
                        WORKING_DIR: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.workdir>
                        HARNESS_BASE_URL: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.baseUrl>
                        HARNESS_ACCOUNT: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.account>
                        HARNESS_ORG: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.organization>
                        HARNESS_PROJECT: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.project>
                        HARNESS_COMMITTER_NAME: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.userName>
                        HARNESS_COMMITTER_EMAIL: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.userEmail>
                        HARNESS_REPO_NAME: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.repoName>
                        REPO_API_TOKEN: <+pipeline.variables.REPO_API_TOKEN>
                        REPO_OWNER: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.repoOwner>
                        REPO_NAME: <+pipeline.stages.FFCleanupStage.spec.execution.steps.metadata.output.outputVariables.repoName>
                    volumes:
                      - name: workspace
                        mountPath: /harness
    variables:
      - name: REPO_URL
        type: String
        description: Repository Url
        required: true
        value: <+input>
      - name: REPO_BRANCH
        type: String
        description: Repository Branch name
        required: true
        value: <+input>
      - name: REPO_API_TOKEN
        type: String
        description: Repository API Token
        required: true
        value: <+input>
      - name: REPO_USERNAME
        type: String
        description: Repository API Token
        required: true
        value: <+input>
      - name: FME_ADMIN_APIKEY
        type: String
        description: FME Admin API Key
        required: true
        value: <+input>
      - name: FME_PROJECT_ID
        type: String
        description: FME Project Id
        required: true
        value: <+input>
      - name: FEATURE_FLAG_SELECTION_CRITERIA
        type: String
        description: The Feature Flag selection criteria to be elegible
        required: true
        value: <+input>
      - name: LLM_AUTH_TOKEN
        type: Secret
        description: ""
        required: true
        default: ANTHROPIC_LLM_AUTH_TOKEN_DEV
        value: <+input>
